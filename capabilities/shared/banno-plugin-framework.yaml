apiVersion: naftiko.io/v1alpha1
kind: Capability
metadata:
  name: banno-plugin-framework
  title: Banno Plugin Framework
  provider: jack-henry
  api: banno-plugin-framework
  description: >-
    Embed custom dashboard cards inside Banno Online and Mobile. Plugins are
    web applications hosted on the partner's infrastructure and registered as
    External Applications in Banno People. The
    @jack-henry/banno-plugin-framework-bridge JavaScript module routes
    postMessage events between the iframe and the Banno shell.
  tags:
    - Plugin Framework
    - Embedded Banking
    - Dashboard Cards
    - Fintech Integration
spec:
  baseUrl: https://digital.banno.com
  auth:
    type: openIdConnect
    discoveryUrl: https://api.banno.com/a/oidc/.well-known/openid-configuration
  operations:
    - id: getPluginManifest
      title: Get Plugin Manifest
      method: GET
      path: /plugins/api/v0/plugins/{pluginId}/manifest
    - id: exchangeBridgeToken
      title: Exchange Bridge Token
      method: POST
      path: /plugins/api/v0/plugins/{pluginId}/bridge/token
    - id: getPluginUserContext
      title: Get Plugin User Context
      method: GET
      path: /plugins/api/v0/context
  sdk:
    - language: JavaScript
      package: "@jack-henry/banno-plugin-framework-bridge"
      repo: https://github.com/Banno/banno-plugin-framework-bridge
  samples:
    - https://github.com/Banno/simple-plugin-example
    - https://github.com/Banno/basic-plugin-example
    - https://github.com/Banno/simple-announcements-plugin
